name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
      - 'CLAUDE.md'
      - 'CONTRIBUTING.md'
  pull_request:
    paths:
      - 'frontend/**'
      - 'CLAUDE.md'
      - 'CONTRIBUTING.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - run: pnpm run lint
        working-directory: frontend

      - run: pnpm exec tsc --noEmit
        working-directory: frontend

      - run: pnpm test
        working-directory: frontend

      - run: pnpm run build
        working-directory: frontend