name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
      - 'CLAUDE.md'
      - 'CONTRIBUTING.md'
  pull_request:
    paths:
      - 'frontend/**'
      - 'CLAUDE.md'
      - 'CONTRIBUTING.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --frozen-lockfile
        working-directory: frontend

      - run: pnpm run lint
        working-directory: frontend

      - run: pnpm exec tsc --noEmit
        working-directory: frontend

      - name: Verify generated API types are in sync
        run: |
          if command -v curl &> /dev/null && curl -sf http://localhost:8000/openapi.json > /dev/null 2>&1; then
            pnpm run gen:api:check
          else
            echo "Backend not running, skipping gen:api:check"
          fi
        working-directory: frontend

      - run: pnpm test
        working-directory: frontend

      - run: pnpm run build
        working-directory: frontend
